<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title> Galerie </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Galerie</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-grid>
    <ion-row>
      @if (isLoading) { @for (item of skeletonItems; track item) {
      <ion-col size="6">
        <ion-skeleton-text
          [animated]="true"
          class="gallery-skeleton"
        ></ion-skeleton-text>
      </ion-col>
      } } @else { @if (isAddingPhoto) {
      <ion-col size="6">
        <div class="pending-card">
          <ion-skeleton-text [animated]="true"></ion-skeleton-text>
          <ion-spinner name="crescent"></ion-spinner>
        </div>
      </ion-col>
      } @for (photo of photoService.photos; track photo.filepath; let i =
      $index) {
      <ion-col size="6">
        <div class="photo-item">
          <ion-img
            [src]="photo.webviewPath"
            class="photo-thumb"
            (click)="openPhoto(i)"
          ></ion-img>
          <div class="photo-actions">
            <ion-button
              fill="clear"
              size="small"
              [attr.aria-label]="
                photo.liked ? 'Retirer des favoris' : 'Ajouter aux favoris'
              "
              (click)="toggleLike(photo)"
            >
              <ion-icon
                slot="icon-only"
                [name]="photo.liked ? 'heart' : 'heart-outline'"
                color="primary"
              ></ion-icon>
            </ion-button>
            <ion-button
              fill="clear"
              size="small"
              aria-label="Supprimer la photo"
              (click)="confirmDelete(photo.filepath)"
            >
              <ion-icon slot="icon-only" name="trash" color="danger"></ion-icon>
            </ion-button>
          </div>
        </div>
      </ion-col>
      } }
    </ion-row>
  </ion-grid>

  <ion-fab vertical="bottom" horizontal="center" slot="fixed">
    <ion-fab-button aria-label="Prendre une photo" (click)="takePhoto()">
      <ion-icon name="camera"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
